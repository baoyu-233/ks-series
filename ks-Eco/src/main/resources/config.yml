# ------------------------------------------------------------------
# market — 市场系统配置
# ------------------------------------------------------------------
market:

  # 玩家挂单最大数量（每人）
  max-listings-per-player: 20

  # 挂单过期时间（小时），0 = 永不过期
  listing-expire-hours: 168

  # 交易税率（比例，0.0 ~ 1.0）
  tax-rate: 0.02

  # 最低交易税（货币单位）
  min-tax: 1.0

  # 是否启用市场 GUI
  gui-enabled: true

# Internal floor valuation is used by the official low-price market sweep.
# Players may list below this value; qualifying listings can then be acquired by the state buyer.
market-protection:
  enabled: true
  internal-fallback-unit-value: 1.0
  # Vanilla enchantments always use the middle tier. FE IDs not listed below do too.
  fe-basic-per-level: 30.0
  fe-mid-per-level: 60.0
