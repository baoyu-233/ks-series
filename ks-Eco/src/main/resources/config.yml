# The state buyer only purchases already-listed items below its calculated floor.
official-market-sweep:
  enabled: true
  interval-seconds: 90
  sample-size: 8

# ------------------------------------------------------------------
# official-buy — 官方收购配置（可量产物品）
# ------------------------------------------------------------------
# 官方只收购、不直售。收购价 = basePrice × (1 + totalOffset)，
# totalOffset 由 price-volatility 一节的算法算出，见下方说明。
# ------------------------------------------------------------------
official-buy:

  enabled: true

  # 旧版波动幅度配置，已被 price-volatility.max-fluctuation 取代，保留字段避免报错
  price-fluctuation: 0.3

  # 价格刷新间隔（分钟）：每隔这么久重算一次波动漂移 + 超卖折扣
  price-refresh-minutes: 60

  # ============================================================
  # 官方收购物品价格表（可量产：矿物、作物、掉落物、原木等）
  # 基准价基于: 获取难度 × 用途价值 × 市场供需
  # ============================================================
  default-items:

    # ---- 贵金属与宝石 (Tier 1: 高价值) ----
    - material: DIAMOND
      base-price: 100.0
    - material: EMERALD
      base-price: 80.0
    - material: NETHERITE_SCRAP
      base-price: 200.0
    - material: ANCIENT_DEBRIS
      base-price: 180.0

    # ---- 冶炼金属 (Tier 2: 中高价值) ----
    - material: GOLD_INGOT
      base-price: 25.0
    - material: IRON_INGOT
      base-price: 10.0
    - material: NETHER_QUARTZ
      base-price: 12.0
    - material: AMETHYST_SHARD
      base-price: 15.0
    - material: COPPER_INGOT
      base-price: 8.0
    - material: LAPIS_LAZULI
      base-price: 4.0

    # ---- 矿物原矿 (Tier 3: 原材料) ----
    - material: RAW_GOLD
      base-price: 8.0
    - material: RAW_IRON
      base-price: 3.0
    - material: RAW_COPPER
      base-price: 2.0
    - material: COAL
      base-price: 3.0
    - material: REDSTONE
      base-price: 5.0
    - material: FLINT
      base-price: 1.0

    # ---- 粮食作物 (Tier 4: 农作物) ----
    - material: WHEAT
      base-price: 2.0
    - material: CARROT
      base-price: 3.0
    - material: POTATO
      base-price: 3.0
