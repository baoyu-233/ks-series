# ------------------------------------------------------------------
# price-volatility — 市场波动模拟（仅作为数据库无记录时的启动默认值，
# 运行时以 web 管理端/数据库为准，改这里的值需要重启或等 web 端覆盖）
# ------------------------------------------------------------------
# 收购价 = basePrice × (1 + totalOffset)
# totalOffset = clamp(driftValue × maxFluctuation − supplyPressure × maxFluctuation, ±maxFluctuation)
#   - supplyPressure：由玩家真实卖给官方的成交量算出的"近期供需压力"（∈[-1,1]，双向：
#     近期卖得比历史基线多=供过于求=打折；卖得比基线少=供不应求=加价，
#     滑动时间窗口内的旧记录会自然"消退"，不需要人工衰减）
#   - driftValue：均值回归的随机游走（∈[-1,1]），模拟"市场自己在波动"；管理员可以给某个物品
#     设置 trend-bias 做"大手导向"，driftValue 会逐渐被拉向目标值而不是瞬间跳变
# ------------------------------------------------------------------
price-volatility:

  # 总开关：关闭后 driftValue 立即清零冻结，价格只受真实超卖影响，不再自动波动
  enabled: true

  # 波动率上限（±比例，如 0.3 = ±30%），web 管理端可实时覆盖
  max-fluctuation: 0.3

  # 每次刷新的随机扰动幅度（标准差）
  step-std-dev: 0.03

  # 大手导向的牵引速度：越大，管理员设置的 trend-bias 生效越快（也越容易被玩家看出是人为的）
  pull-strength: 0.15

  # 无导向时 driftValue 自然回归 0 的速度
  natural-reversion-rate: 0.05

  # 超卖压力统计的滑动时间窗口（小时）：窗口外的卖出记录不再计入压力
  oversupply-window-hours: 24

  # 计算"该物品历史正常卖出量"的回看天数（自动校准基线，无需给每个物品单独配置）
  baseline-lookback-days: 14

  # 全新物品/冷门物品没有历史成交时的兜底基线量，避免第一笔交易就打到最深折扣
  default-baseline-qty: 64

  # 游戏内波动报告的发布间隔（小时）
  report-interval-hours: 6

  # 波动报告里列出涨跌幅最大的几个物品
  report-top-n: 5

# ------------------------------------------------------------------
# shulker-box — 潜影盒深度解析配置
# ------------------------------------------------------------------
shulker-box:

  # 最大递归深度（防止恶意嵌套导致性能问题）
  max-recursion-depth: 3

  # 是否将潜影盒内物品计入交易总价
  count-contents: true

  # 空潜影盒基础价值
  # Used only by market-floor valuation. The official buyer pays only for accepted contents.
  empty-box-value: 55.0

# ------------------------------------------------------------------
# storage — 暂存箱配置
# ------------------------------------------------------------------
storage:

  # 每个玩家暂存箱最大容量（格数）
  max-slots: 54

  # 物品暂存最大天数（0 = 永久）
  max-days: 30

# Player item delivery under /trade send. All values can also be changed from the admin web panel.
transport:
  enabled: true
  # Same-world deliveries within this distance are free.
  free-distance: 8.0
  base-fee: 10.0
  per-block-fee: 0.05
  cross-world-surcharge: 500.0
  minimum-fee: 1.0
  # 0 means no upper fee cap.
  maximum-fee: 0.0

# Player money transfers. Tax is charged only on the portion above tax-free-amount.
# The recipient always receives the full transfer amount; the sender pays tax in addition.
transfer:
  tax-free-amount: 1000.0
  # Used only when ks-Eco-tax is unavailable. With the tax module loaded, PLAYER_TRANSFER controls the rate.
  tax-rate-fallback: 0.01

# Server-authoritative pricing and bounds for plots purchased inside dungeon instances.
realestate:
  instance-plot-price-per-block: 100.0
  instance-plot-min-price: 1000.0
  instance-plot-max-area: 65536
  instance-plot-max-radius: 256

# Enterprise levels are set explicitly by administrators. Other systems read
# level and modifiers through EnterpriseLevelManager as the single authority.
enterprise-levels:
  max-level: 10
  land-perk-multipliers:
    1: 1.00
    2: 1.05
    3: 1.10
    4: 1.15
    5: 1.20
    6: 1.26
    7: 1.32
    8: 1.38
    9: 1.44
    10: 1.50

# ------------------------------------------------------------------
# extra-modules — 子模块加载配置
# ------------------------------------------------------------------
extra-modules:

  # 是否启用 extra 模块加载
  enabled: true

  # extra 模块目录（相对于 plugins/ks-Eco/）
  directory: "extra"

  # 已启用的模块列表（留空 = 加载 extra/ 下全部 JAR）
  # 注意：模块 ID 必须全小写（代码中 JAR 文件名 strip 版本号后 toLowerCase 匹配）
  enabled-modules: []

# ------------------------------------------------------------------
# player-features — 玩家功能开放控制（逐步开放经济插件用）
# ------------------------------------------------------------------
# 控制每个功能是否对普通玩家开放（指令/游戏内GUI图标/网页Tab/网页API 全部受控）。
# 拥有 kseco.admin 权限的玩家不受此限制。
# 暂存箱(storage)、纳税记录查询不在此名单中，始终对玩家开放，不受此处影响。
# 推荐通过网页管理后台「功能开放」面板勾选，立即生效；也可直接改这里后 /kseco-admin reload。
player-features:
  market: true
  bank: true
  transfer: true
  enterprise: true
  bidding: true
  trade: true
  exchange: true
  realestate: true
  dungeon: true
  politic: true
  blindbox: true
  ent_blindbox: true
  limited_sale: true
  compensation: true
  invites: true
