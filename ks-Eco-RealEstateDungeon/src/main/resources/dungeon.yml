# ks-Eco-RealEstateDungeon 默认配置（纯副本生成插件）
# 通过 Web API POST /ks-Eco/api/realestate-dungeon/config 热更新
# 标记 [即时] = 修改后立刻生效，[副本] = 下次副本开启时生效
#
# 注：房产相关配置（开发费/契税/容积率）已迁至 ks-Eco-RealEstate 插件。

# 副本门票
ticket:
  default_price: 500.0          # [即时] 默认门票价格（队长开本付一张）

# 复活机制
revive:
  base_cost: 200.0              # [即时] 第一次复活费用
  exponent: 1.8                 # [即时] 指数增长倍率: cost = base * exponent^(n-1)
  max_revives_per_player: 10    # [即时] 每人最大复活次数

# 实例世界请求参数（网格生命周期由 ks-InstanceWorld 持久化和管理）
grid:
  world_name: "ks-dungeon-world"  # [副本] 虚空世界名
  spacing: 5000                   # [副本] 网格间距
  max_grids: 64                   # [副本] 最大网格数
  instance_timeout_minutes: 60    # [即时] 副本超时（模板 timeLimit 可覆盖）

# 地图由 ks-InstanceWorld 通过 FAWE 粘贴；经济副本只解释返回的战斗标记。
# 兼容格式：[mm]/怪物名:等级/boss；通用格式：[marker]/mm/怪物名:等级/boss；出生点使用 [spawn]。
#          → //copy（站在出生点）→ //schem save <图名> → 把图名填进模板的「地图」字段
map:
  base_y: 64           # [副本] 贴图基准高度，clipboard 原点对齐到 (网格中心X, base_y, 网格中心Z)
  arena_radius: 256    # [副本] 清场/清画布水平半径（以网格中心为原点）。须 ≥ 单个 schematic 水平尺寸的一半
  prepare_timeout_seconds: 120 # [副本] 世界加载、清画布、贴图和标记扫描的总超时
  spawn_mobs: true     # [即时] 是否解释通用 marker 并调用 MythicMobs 刷怪
