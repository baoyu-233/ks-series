# 第一赛季材料经济。战斗凭证是账号绑定的进度记录，不会出现在此处，
# 也不能兑换、交易或作为 MMOItems 物品存在。
qualities:
  KS_STANDARD: "普通：基础制造装备与野外材料。"
  KS_REFINED: "精制：机器辅助升级材料与首批饰品。"
  KS_RARE: "稀有：精英内容与高级升级材料。"
  KS_RELIC: "遗物：需要首领进度的突破材料，不能在商店直接购买。"

# 除原版材料外，每种输入与产物都必须严格匹配 MMOItems 类型和 ID。
# 第一赛季只允许单向兑换，避免剩余材料反向折算为原始价值。
exchange:
  refined_alloy:
    display: "8 野外废料 -> 1 精炼合金"
    inputs:
      scrap:
        kind: mmoitem
        type: MATERIAL
        id: KS_FIELD_SCRAP
        amount: 8
    output:
      type: MATERIAL
      id: KS_REFINED_ALLOY
      amount: 1
  conductive_coil:
    display: "4 精炼合金 + 16 红石 -> 1 导能线圈"
    inputs:
      alloy:
        kind: mmoitem
        type: MATERIAL
        id: KS_REFINED_ALLOY
        amount: 4
      redstone:
        kind: vanilla
        material: REDSTONE
        amount: 16
    output:
      type: MATERIAL
      id: KS_CONDUCTIVE_COIL
      amount: 1
  stabilized_core:
    display: "4 导能线圈 + 8 紫水晶碎片 -> 1 稳固核心"
    inputs:
      coil:
        kind: mmoitem
        type: MATERIAL
        id: KS_CONDUCTIVE_COIL
        amount: 4
      amethyst:
        kind: vanilla
        material: AMETHYST_SHARD
        amount: 8
    output:
      type: MATERIAL
      id: KS_STABILIZED_CORE
      amount: 1
  relic_fragment:
    display: "2 稳固核心 + 1 回响碎片 -> 1 遗物碎片"
    inputs:
      core:
        kind: mmoitem
        type: MATERIAL
        id: KS_STABILIZED_CORE
        amount: 2
      echo:
        kind: vanilla
        material: ECHO_SHARD
        amount: 1
    output:
      type: MATERIAL
      id: KS_RELIC_FRAGMENT
      amount: 1

# 战斗凭证是账号绑定的玩家持久数据，不能交易、丢弃或作为物品发放。
# 新增凭证或门槛后执行 /ksrpg 重载 即可生效，无需替换 JAR。
# 外部插件通过 Bukkit ServicesManager 读取 RpgProgressionApi；配置型首领/地牢
# 也可由控制台执行：ksrpg proof grant <玩家名> <凭证ID>。
  trailblazer_blade:
    display: "24 Field Scrap + 8 Frost Scale -> Trailblazer Blade"
    inputs:
      scrap:
        kind: mmoitem
        type: MATERIAL
        id: KS_FIELD_SCRAP
        amount: 24
      scale:
        kind: mmoitem
        type: MATERIAL
        id: KS_FROST_SCALE
        amount: 8
    output:
      type: SWORD
      id: KS_TRAILBLAZER_BLADE
      amount: 1
  icefall_shortbow:
    display: "20 Field Scrap + 8 Frost Scale -> Icefall Shortbow"
    inputs:
      scrap:
        kind: mmoitem
        type: MATERIAL
        id: KS_FIELD_SCRAP
        amount: 20
      scale:
        kind: mmoitem
        type: MATERIAL
        id: KS_FROST_SCALE
        amount: 8
    output:
      type: BOW
      id: KS_ICEFALL_SHORTBOW
      amount: 1
  salvager_maul:
    display: "28 Field Scrap + 10 Frost Scale -> Salvager Maul"
    inputs:
      scrap:
        kind: mmoitem
        type: MATERIAL
        id: KS_FIELD_SCRAP
        amount: 28
      scale:
        kind: mmoitem
        type: MATERIAL
        id: KS_FROST_SCALE
        amount: 10
    output:
      type: HAMMER
      id: KS_SALVAGER_MAUL
      amount: 1
  relay_pike:
    display: "12 Frost Scale + 2 Refined Alloy + 1 Conductive Coil -> Relay Pike"
    inputs:
      scale:
        kind: mmoitem
        type: MATERIAL
        id: KS_FROST_SCALE
        amount: 12
      alloy:
        kind: mmoitem
        type: MATERIAL
        id: KS_REFINED_ALLOY
        amount: 2
      coil:
        kind: mmoitem
        type: MATERIAL
        id: KS_CONDUCTIVE_COIL
        amount: 1
    output:
      type: SPEAR
      id: KS_RELAY_PIKE
      amount: 1
  quarry_maul:
    display: "16 Frost Scale + 3 Refined Alloy + 1 Whelp Core -> Quarry Maul"
    inputs:
      scale:
        kind: mmoitem
        type: MATERIAL
        id: KS_FROST_SCALE
        amount: 16
      alloy:
        kind: mmoitem
        type: MATERIAL
        id: KS_REFINED_ALLOY
        amount: 3
      core:
        kind: mmoitem
        type: MATERIAL
        id: KS_WHELP_CORE
        amount: 1
    output:
      type: HAMMER
      id: KS_QUARRY_MAUL
      amount: 1
  windward_bow:
    display: "12 Frost Scale + 2 Refined Alloy + 1 Conductive Coil -> Windward Bow"
    inputs:
      scale:
        kind: mmoitem
        type: MATERIAL
        id: KS_FROST_SCALE
        amount: 12
      alloy:
        kind: mmoitem
        type: MATERIAL
        id: KS_REFINED_ALLOY
        amount: 2
      coil:
        kind: mmoitem
        type: MATERIAL
        id: KS_CONDUCTIVE_COIL
        amount: 1
    output:
      type: BOW
      id: KS_WINDWARD_BOW
      amount: 1

combat-proofs:
  frostbound_conductor_clear:
    display: "冰缚统领协作凭证"

# 门槛只提供统一检查，不会自行扣除材料、货币或凭证。
# 实际突破交易稍后接入时，直接复用这些 ID 与检查结果。
gates:
  frostbound_relic_breakthrough:
    display: "冰缚遗物突破"
    required-proofs:
      - frostbound_conductor_clear
