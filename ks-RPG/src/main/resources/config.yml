combat-proofs:
  frostbound_conductor_clear:
    display: "冰缚统领协作凭证"

# 门槛只提供统一检查，不会自行扣除材料、货币或凭证。
# 实际突破交易稍后接入时，直接复用这些 ID 与检查结果。
gates:
  frostbound_relic_breakthrough:
    display: "冰缚遗物突破"
    required-proofs:
      - frostbound_conductor_clear
