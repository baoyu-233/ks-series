# 第一赛季材料经济。战斗凭证是账号绑定的进度记录，不会出现在此处，
# 也不能兑换、交易或作为 MMOItems 物品存在。
season:
  # 赛季运行时默认关闭。开启后当前只初始化本地存储，不会创建赛季、启动事件或修改玩家数据。
  enabled: false
  storage:
    sqlite-file: season.db
    busy-timeout-ms: 5000
  reputation:
    weekly-cap: 1000
    catchup-cap: 3000
    late-join-catchup-per-week: 600

qualities:
  KS_STANDARD: "普通：基础制造装备与野外材料。"
  KS_REFINED: "精制：机器辅助升级材料与首批饰品。"
  KS_RARE: "稀有：精英内容与高级升级材料。"
  KS_RELIC: "遗物：需要首领进度的突破材料，不能在商店直接购买。"

# 除原版材料外，每种输入与产物都必须严格匹配 MMOItems 类型和 ID。
# 第一赛季只允许单向兑换，避免剩余材料反向折算为原始价值。
exchange:
  refined_alloy:
    display: "8 野外废料 -> 1 精炼合金"
    inputs:
      scrap:
        kind: mmoitem
        type: MATERIAL
        id: KS_FIELD_SCRAP
        amount: 8
    output:
      type: MATERIAL
      id: KS_REFINED_ALLOY
      amount: 1
  conductive_coil:
    display: "4 精炼合金 + 16 红石 -> 1 导能线圈"
    inputs:
      alloy:
        kind: mmoitem
        type: MATERIAL
        id: KS_REFINED_ALLOY
        amount: 4
      redstone:
        kind: vanilla
        material: REDSTONE
        amount: 16
    output:
      type: MATERIAL
      id: KS_CONDUCTIVE_COIL
      amount: 1
  stabilized_core:
    display: "4 导能线圈 + 8 紫水晶碎片 -> 1 稳固核心"
    inputs:
      coil:
        kind: mmoitem
        type: MATERIAL
        id: KS_CONDUCTIVE_COIL
        amount: 4
      amethyst:
        kind: vanilla
        material: AMETHYST_SHARD
        amount: 8
    output:
      type: MATERIAL
      id: KS_STABILIZED_CORE
      amount: 1
  relic_fragment:
    display: "2 稳固核心 + 1 回响碎片 -> 1 遗物碎片"
    inputs:
      core:
        kind: mmoitem
        type: MATERIAL
        id: KS_STABILIZED_CORE
        amount: 2
      echo:
        kind: vanilla
        material: ECHO_SHARD
        amount: 1
    output:
      type: MATERIAL
      id: KS_RELIC_FRAGMENT
      amount: 1

