# ============================================================
# ks-core 配置文件
# 版本: 1.0.0
# 路径: plugins/ks-core/config.yml
# ============================================================

# ------------------------------------------------------------------
# web-gateway — 统一 Web 网关配置
# ------------------------------------------------------------------
web-gateway:

  # 是否启用 Web 网关
  enabled: true

  # HTTP 监听端口（面板服唯一端口，复用给所有子插件）
  port: 58578

  # 绑定 IP 地址
  #   "127.0.0.1" — 仅本机
  #   "0.0.0.0"   — 所有网卡（面板服必须）
  bind-address: "0.0.0.0"

  # 对外显示地址（为空则使用 bind-address）
  public-address: ""

  # Token 超时时间（秒）
  token-timeout-seconds: 600

  # HTTP 线程池大小
  max-threads: 8

# ------------------------------------------------------------------
# sub-plugins — 子插件路由注册
# ------------------------------------------------------------------
sub-plugins:

  # ItemEditor 接管
  KS-ItemEditor:
    enabled: true
    route: "/IE"

  # 地图插件
  kshwp:
    enabled: true
    route: "/kSHWP"

  # 经济插件
  ks-eco:
    enabled: true
    route: "/ks-Eco"

  # KS 兼容层
  ks-compat:
    enabled: true
    route: "/ks-Compat"

# ------------------------------------------------------------------
# database — 数据存储配置
# ------------------------------------------------------------------
database:
  # sqlite | mysql | mariadb | postgresql | auto
  # SQLite remains the zero-configuration, single-server default.
  type: sqlite

  # Optional explicit JDBC settings. With type: auto, the URL selects the dialect.
  # PostgreSQL requires an explicit jdbc-url. MySQL/MariaDB can also use the
  # legacy mysql block below when jdbc-url is empty.
  jdbc-url: ""
  driver-class-name: ""
  username: ""
  # 凭据优先级：password > password-env > password-file > 旧 mysql.password。
  # password-env/password-file 适合公开仓库和多端部署；修改后需重启服务端。
  password: ""
  password-env: ""
  # 相对路径以 plugins/ks-core/ 为根，也可填写绝对路径。
  password-file: ""

  # Remote database failures are fatal by default. Enabling this keeps a node
  # online with local SQLite, but that node no longer shares cross-server data.
  fallback-to-sqlite: false

  sqlite:
    # SQLite 数据库文件路径（相对于 plugins/ks-core/）
    file: "data.db"
    busy-timeout-ms: 5000

  # Backward-compatible URL builder for MySQL and MariaDB.
  mysql:
    host: "localhost"
    port: 3306
    database: "ks_core"
    username: ""
    password: ""
    use-ssl: false
    pool-size: 5

  pool:
    maximum-pool-size: 5
    minimum-idle: 1
    connection-timeout-ms: 10000
    validation-timeout-ms: 5000
    idle-timeout-ms: 600000
    max-lifetime-ms: 1800000
    leak-detection-threshold-ms: 0
