# ============================================================
# ItemEditor 配置文件
# 版本: 1.2.0
# 路径: plugins/ItemEditor/config.yml
#
# 说明:
#   - 所有字符串值如不需要可留空 ""
#   - 布尔值使用 true / false
#   - 数字使用整数或小数
#   - 修改后使用 /itemedit reload 重载配置（或重启服务器）
# ============================================================

# ------------------------------------------------------------------
# web-server — 网页物品设计器内置 HTTP 服务
#
# 管理员使用 /design 命令可获取一个含 token 的浏览器链接，
# 在网页中可视化编辑物品名称、Lore、附魔、属性等内容。
# 玩家使用 /design 可进入受限的玩家编辑器。
# ------------------------------------------------------------------
web-server:

  # 是否在插件启用时自动启动 Web 服务器。
  # 设为 false 可完全禁用网页编辑器功能。
  # 类型: boolean | 默认: true
  enabled: true

  # HTTP 服务监听端口。
  # 请确保该端口未被其他程序占用（如其他插件、Nginx 等）。
  # 如果服务器有防火墙，请放行此端口（仅限信任的网络）。
  # 有效范围: 1–65535 | 默认: 8123
  port: 8123

  # 绑定 IP 地址（本地网卡监听地址）。
  #   "127.0.0.1" — 仅本机可访问（最安全，推荐个人本地测试）
  #   "0.0.0.0"   — 监听所有网络接口（面板服/公网必须用这个）
  #   也可以指定具体的局域网 IP，如 "192.168.1.100"
  # 类型: string | 默认: "127.0.0.1"
  bind-address: "127.0.0.1"

  # ★ 对外访问地址（用于生成游戏内可点击链接）。
  # 当 bind-address 设为 "0.0.0.0" 时，游戏内生成的链接也会是 http://0.0.0.0:端口，
  # 这是无效的。public-address 可以让绑定和显示分离：
  #   例: bind-address: "0.0.0.0" + public-address: "mc8.yldw.net"
  #   → 服务器监听所有网卡，但生成的链接显示 http://mc8.yldw.net:端口
  # 留空 "" 则自动使用 bind-address 的值（兼容旧配置）。
  # 类型: string | 默认: "" (回退到 bind-address)
  public-address: ""

  # Web 会话 token 的超时时间（秒）。
  # 超时后用户需在游戏内重新执行 /design 获取新链接。
  # 前端会自动每 2 分钟发送保活请求，因此只要浏览器页面打开就不会过期。
  # 有效范围: 60–86400 (1分钟–24小时) | 默认: 600 (10分钟)
  token-timeout-seconds: 600

# ------------------------------------------------------------------
# fe-enchantments — FotiaEnchantment 自定义附魔兼容性设置
#
# 控制网页编辑器与游戏内 GUI 中 FE 附魔的行为。
# 注意：修改后需要 /itemedit reload 或重启服务器生效。
# ------------------------------------------------------------------
fe-enchantments:

  # 管理员网页编辑器中的最大附魔等级（单个附魔）。
  # 设为 0 则不限制（以 FE 插件自身最大等级为准）。
  # 有效范围: 0–32767 | 默认: 32767
  admin-max-enchant-level: 32767

  # 是否忽略原版附魔的互斥冲突（如保护 + 火焰保护）。
  #   false — 遵循 Minecraft 原版冲突规则（默认，安全）
  #   true  — 允许互斥附魔共存（可能破坏游戏平衡，慎用）
  # 类型: boolean | 默认: false
  ignore-vanilla-conflicts: false

  # 是否忽略 FotiaEnchantment 内部的冲突/兼容性检查。
  #   false — 遵循 FE 插件自身的冲突规则（默认，安全）
  #   true  — 强制设置，忽略 FE 冲突（⚠️ 可能导致异常行为，慎用）
  # 类型: boolean | 默认: false
  ignore-fe-conflicts: false

  # ⚠️ 兼容性提醒模式：是否在网页编辑器中显示潜在的冲突警告图标。
  # 仅作为提示，不会阻止附魔添加。
  # 类型: boolean | 默认: true
  show-compatibility-warnings: true

# ------------------------------------------------------------------
# refine — 武器精炼系统
#
# 玩家使用兑换券 (Voucher) 自定义精炼武器。
# 使用 /refine 命令打开精炼 GUI。
# ------------------------------------------------------------------
refine:

  # ===== 兑换券配置 =====
  # 定义什么样的物品可以被识别为"精炼券"。
  voucher:

    # 匹配模式，决定如何识别兑换券物品。
    #   MYTHICMOBS — 通过 MythicMobs 物品内部 ID 匹配（推荐用于 MM 物品）
    #   MATERIAL    — 通过原版物品材质 + 可选名称/Lore 匹配
    # 类型: string (枚举) | 默认: MYTHICMOBS
    mode: MYTHICMOBS

    # [仅 MYTHICMOBS 模式]
    # MythicMobs 物品的内部 ID。
    # 对应 MythicMobs 配置文件中定义的物品名（如 items/refine_token.yml）。
    # 例如 "RefineToken" 对应 .yml 中 id: RefineToken 的物品。
    # 类型: string | 默认: "RefineToken"
    mythicmobs-id: "RefineToken"

    # [仅 MATERIAL 模式]
    # 原版物品材质名称（大写，如 PAPER、EMERALD、NETHER_STAR 等）。
    # 类型: string | 默认: "PAPER"
    material: "PAPER"

    # [仅 MATERIAL 模式]
    # 物品显示名称需包含此文本（区分大小写）。
    # 留空 "" 则不检查名称，仅匹配材质。
    # 类型: string | 默认: "精炼券"
    name-contains: "精炼券"

    # [仅 MATERIAL 模式]
    # 物品 Lore 需包含此文本（区分大小写）。
    # 留空 "" 则不检查 Lore。
    # 类型: string | 默认: ""
    lore-contains: ""

    # 每次精炼确认时消耗的兑换券数量。
    # 有效范围: 1–64 | 默认: 1
    amount: 1

  # 玩家精炼时可设置的最大附魔等级（单个附魔）。
  # 限制了附魔叠加的强度上限。
  # 有效范围: 1–255 | 默认: 10
  max-enchant-level: 10
