# ============================================
# 自定义附魔书外观配置
# EN: Custom enchantment book appearance configuration
# ============================================
# 这里控制实际产出的自定义附魔书外观：
# EN: Controls the appearance of generated custom enchantment books:
# - 星芒魔典揭示得到的附魔书
# EN: - Enchantment books revealed from Stellaris Codex items
# - 祛魔石拆卸返还的附魔书
# - 村民交易生成的自定义附魔书
# EN: - Custom enchantment books generated by villager trades
#
# 支持字段：
# EN: Supported fields:
#   custom-model-data 或 modeldata: CustomModelData；填 0 或删除表示不设置
# EN: custom-model-data or modeldata: CustomModelData; use 0 or remove the field to disable it
#   item-model 或 itemmodel: 1.21+ item model，如 fotiaenchantment:radiant_book
# EN: item-model or itemmodel: 1.21+ item model, such as fotiaenchantment:radiant_book
#   tooltip-style: 1.21+ tooltip style，如 minecraft:enchanted_book
# EN: tooltip-style: 1.21+ tooltip style, such as minecraft:enchanted_book
#
# default 会作为所有稀有度的默认值，具体稀有度配置会覆盖 default。
# EN: default is used for all rarities unless a specific rarity overrides it.
# ============================================

default:
  custom-model-data: 0
  item-model: ""
  tooltip-style: ""

dustlight:
  custom-model-data: 0
  item-model: ""
  tooltip-style: ""

moonlit:
  custom-model-data: 0
  item-model: ""
  tooltip-style: ""

radiant:
  custom-model-data: 0
  item-model: ""
  tooltip-style: ""

aureate:
  custom-model-data: 0
  item-model: ""
  tooltip-style: ""

divine:
  custom-model-data: 0
  item-model: ""
  tooltip-style: ""
