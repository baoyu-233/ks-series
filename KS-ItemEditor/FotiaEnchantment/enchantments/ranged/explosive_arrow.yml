# ============================================
# 爆裂箭 (Explosive Arrow)
# EN: Explosive Arrow (爆裂箭)
# 弓箭命中时有概率产生爆炸，造成范围伤害
# ============================================

# 附魔ID（唯一标识，不可重复）
# EN: Enchantment ID; must be unique
id: explosive_arrow

# 是否启用此附魔
# EN: Whether this enchantment is enabled
enabled: true

# 最大等级
# EN: Maximum level
max-level: 3

# 稀有度（对应 rarity.yml 中定义的稀有度ID）
# EN: Rarity ID defined in rarity.yml
rarity: radiant

# 所属附魔组（对应 groups.yml）
# EN: Enchantment group defined in groups.yml
group: offensive

# 可应用的物品类型
# EN: Applicable item types
applicable-items:
  - BOW
  - CROSSBOW

# 冲突的附魔ID列表
# EN: Conflicting enchantment IDs
conflicts:
  - homing_arrow

# 获取方式配置
# EN: Acquisition method configuration
obtain:
  enchanting-table: true
  anvil: true
  villager-trade: true
  loot-table: true

# 附魔台权重（影响附魔台中出现概率）
# EN: Enchanting table weight; affects chance to appear
enchanting-table-weight: 8

# 星芒魔典抽取池配置
# EN: Stellaris Codex roll pool configuration
codex-pools:
  radiant: 10
  aureate: 4

# 效果配置（核心：Trigger → Condition → Effect 管道）
# EN: Effect configuration; core pipeline is Trigger -> Condition -> Effect
effects:
  # 弓箭攻击时概率爆炸
  - trigger: BOW_ATTACK
    conditions:
      # 概率触发
      # EN: Chance-based trigger
      - type: chance
        value: "{level} * 20"
    actions:
      # 产生爆炸（不破坏方块）
      - type: EXPLODE
        power: "{level} * 0.8"
        break-blocks: false
      # 爆炸粒子特效
      - type: PARTICLE
        particle: EXPLOSION_EMITTER
        count: 1
      # 播放爆炸音效
      - type: SOUND
        sound: entity.generic.explode
        volume: 0.8
        pitch: 1.0
    # 冷却时间（tick）
    # EN: Cooldown time in ticks
    cooldown: 100
