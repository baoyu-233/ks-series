<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">ks-Eco 经济系统总览</title>
  <desc id="desc">玩家入口、核心结算、盲盒、限时商店、补偿和 Extra 模块之间的关系图</desc>
  <defs>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#67e8f9"/></marker>
    <marker id="arrow-yellow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#facc15"/></marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#86efac"/></marker>
    <style>
      .title { font: 700 36px 'Microsoft YaHei', 'Noto Sans CJK SC', sans-serif; fill: #f8fafc; }
      .subtitle { font: 400 18px 'Microsoft YaHei', 'Noto Sans CJK SC', sans-serif; fill: #94a3b8; }
      .section { font: 700 22px 'Microsoft YaHei', 'Noto Sans CJK SC', sans-serif; fill: #e2e8f0; }
      .box-title { font: 700 21px 'Microsoft YaHei', 'Noto Sans CJK SC', sans-serif; fill: #f8fafc; }
      .box-text { font: 400 16px 'Microsoft YaHei', 'Noto Sans CJK SC', sans-serif; fill: #cbd5e1; }
      .small { font: 400 15px 'Microsoft YaHei', 'Noto Sans CJK SC', sans-serif; fill: #94a3b8; }
      .pill { font: 700 15px 'Microsoft YaHei', 'Noto Sans CJK SC', sans-serif; fill: #0f172a; }
    </style>
  </defs>
  <rect width="1600" height="980" fill="#0b1220"/>
  <rect x="28" y="28" width="1544" height="924" rx="18" fill="#111827" stroke="#334155" stroke-width="2"/>
  <text x="72" y="84" class="title">ks-Eco 经济系统总览</text>
  <text x="72" y="116" class="subtitle">玩家入口 → 业务模块 → 统一结算：余额、完整 ItemStack、暂存箱与幂等记录</text>

  <text x="72" y="176" class="section">玩家入口</text>
  <rect x="72" y="200" width="280" height="270" rx="12" fill="#172554" stroke="#38bdf8" stroke-width="2"/>
  <text x="98" y="244" class="box-title">游戏内 GUI / Web</text>
  <text x="98" y="282" class="box-text">/kseco gui</text><text x="98" y="314" class="box-text">/kseco web</text>
  <text x="98" y="346" class="box-text">/limitedsale</text><text x="98" y="378" class="box-text">/storage</text>
  <text x="98" y="426" class="small">市场、盲盒、限时商品、</text><text x="98" y="450" class="small">补偿和资产查看</text>

  <text x="424" y="176" class="section">核心经济与结算</text>
  <rect x="424" y="200" width="420" height="270" rx="12" fill="#132f35" stroke="#67e8f9" stroke-width="2"/>
  <text x="452" y="244" class="box-title">ks-Eco Core</text>
  <text x="452" y="282" class="box-text">市场 / 官方收购 / 动态定价</text>
  <text x="452" y="318" class="box-text">Vault / SQLite 事务结算</text>
  <text x="452" y="354" class="box-text">完整 NBT 序列化与物品快照</text>
  <text x="452" y="390" class="box-text">余额、库存、限购与购买日志</text>
  <rect x="452" y="418" width="350" height="30" rx="15" fill="#67e8f9"/><text x="627" y="439" text-anchor="middle" class="pill">统一结算契约</text>

  <text x="916" y="176" class="section">活动与运营业务</text>
  <rect x="916" y="200" width="280" height="270" rx="12" fill="#3b1f42" stroke="#e879f9" stroke-width="2"/>
  <text x="942" y="244" class="box-title">盲盒</text><text x="942" y="282" class="box-text">稀有度 + 权重</text>
  <text x="942" y="314" class="box-text">Pity 保底 + 十连</text><text x="942" y="346" class="box-text">企业公户 / 票券</text>
  <text x="942" y="378" class="box-text">NBT 奖励 → 暂存箱</text>
  <rect x="942" y="418" width="190" height="30" rx="15" fill="#f0abfc"/><text x="1037" y="439" text-anchor="middle" class="pill">随机但可解释</text>

  <rect x="1232" y="200" width="280" height="270" rx="12" fill="#422006" stroke="#facc15" stroke-width="2"/>
  <text x="1258" y="244" class="box-title">限时商店</text><text x="1258" y="282" class="box-text">开售 / 结束时间</text>
  <text x="1258" y="314" class="box-text">总库存 + 个人限购</text><text x="1258" y="346" class="box-text">1 份 / 10 份 / 整盒</text>
  <text x="1258" y="378" class="box-text">直售或绑定盲盒池</text>
  <rect x="1258" y="418" width="190" height="30" rx="15" fill="#fde68a"/><text x="1353" y="439" text-anchor="middle" class="pill">时间与稀缺</text>

  <line x1="352" y1="335" x2="424" y2="335" stroke="#67e8f9" stroke-width="3" marker-end="url(#arrow-cyan)"/>
  <line x1="844" y1="300" x2="916" y2="300" stroke="#e879f9" stroke-width="3" marker-end="url(#arrow-cyan)"/>
  <line x1="844" y1="390" x2="1232" y2="390" stroke="#facc15" stroke-width="3" marker-end="url(#arrow-yellow)"/>
  <text x="856" y="382" class="small">扣款、库存、奖池规则</text>

  <text x="72" y="540" class="section">共享安全出口</text>
  <rect x="72" y="566" width="440" height="190" rx="12" fill="#17202a" stroke="#86efac" stroke-width="2"/>
  <text x="100" y="610" class="box-title">暂存箱 / ks_eco_storage</text><text x="100" y="648" class="box-text">背包满时接收盲盒、商店和补偿物品</text>
  <text x="100" y="684" class="box-text">完整保留名称、Lore、附魔、PDC</text><text x="100" y="720" class="box-text">玩家通过 /storage 再领取</text>

  <rect x="584" y="566" width="440" height="190" rx="12" fill="#302014" stroke="#fb923c" stroke-width="2"/>
  <text x="612" y="610" class="box-title">服务器补偿</text><text x="612" y="648" class="box-text">方案：物品、数量、有效期、启用状态</text>
  <text x="612" y="684" class="box-text">每个玩家每个方案只允许领取一次</text><text x="612" y="720" class="box-text">领取记录与物品入库同一事务</text>

  <rect x="1096" y="566" width="416" height="190" rx="12" fill="#1e293b" stroke="#a5b4fc" stroke-width="2"/>
  <text x="1124" y="610" class="box-title">Extra 业务模块</text><text x="1124" y="648" class="box-text">银行 · 企业 · 税收 · 房地产</text>
  <text x="1124" y="684" class="box-text">副本 · 政治 · 主任务</text><text x="1124" y="720" class="box-text">按需加载，缺失时核心经济仍可运行</text>

  <line x1="640" y1="470" x2="420" y2="566" stroke="#86efac" stroke-width="3" marker-end="url(#arrow-green)"/>
  <line x1="1050" y1="470" x2="810" y2="566" stroke="#fb923c" stroke-width="3" marker-end="url(#arrow-yellow)"/>
  <line x1="1280" y1="470" x2="1300" y2="566" stroke="#a5b4fc" stroke-width="3" marker-end="url(#arrow-cyan)"/>

  <rect x="72" y="824" width="1440" height="84" rx="12" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="792" y="858" text-anchor="middle" class="box-text">设计核心：资源产出 → 市场发现价格 → 活动与系统消耗 → 物品/余额可追踪结算</text>
  <text x="792" y="889" text-anchor="middle" class="small">失败退款 · 一次性领取 · NBT 完整性 · 背包满转暂存箱 · 管理操作可解释</text>
</svg>
